<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account – DoctorsCares</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-bg">

    <div class="auth-container">

        <div class="auth-logo">
            <a href="index.html" class="logo" style="color:#ffffff;"><span>D</span>octors<span>C</span>ares<span class="dot" style="color:#60a5fa">.</span></a>
        </div>

        <div class="auth-card">

            <!-- LOGIN -->
            <div class="form-side login-form">
                <h2>Welcome Back</h2>
                <p>Login to manage your appointments and health records.</p>
                <form>
                    <div class="input-box">
                        <i class="fas fa-envelope"></i>
                        <input type="text" placeholder="Email or Mobile Number" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Password" required>
                    </div>
                    <div style="text-align:right; margin-bottom:2rem;">
                        <a href="#" style="font-size:1.3rem; color:var(--primary); font-weight:600;">Forgot password?</a>
                    </div>
                    <button type="submit" class="button btn-primary" style="width:100%; justify-content:center; border-radius:var(--radius-sm); font-size:1.6rem; padding:1.5rem;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                <div style="display:flex; align-items:center; gap:1.5rem; margin: 2.5rem 0;">
                    <div style="flex:1;height:1px;background:var(--border);"></div>
                    <span style="font-size:1.3rem;color:var(--text-muted);">or continue with</span>
                    <div style="flex:1;height:1px;background:var(--border);"></div>
                </div>
                <button style="
                    width:100%; padding:1.3rem; border-radius:var(--radius-sm);
                    border:1.5px solid var(--border); background:var(--white);
                    font-size:1.4rem; font-weight:600; cursor:pointer;
                    display:flex; align-items:center; justify-content:center; gap:1rem;
                    color:var(--text); font-family:'DM Sans',sans-serif;
                    transition:all 0.3s ease;
                " onmouseover="this.style.borderColor='#2563eb'" onmouseout="this.style.borderColor='var(--border)'">
                    <i class="fab fa-google" style="color:#ea4335; font-size:1.6rem;"></i> Continue with Google
                </button>
                <p class="toggle-text">New patient? <a href="#" id="to-signup">Create an account</a></p>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Return to Home</a>
            </div>

            <!-- SIGN UP -->
            <div class="form-side signup-form" style="display:none;">
                <h2>Create Account</h2>
                <p>Join thousands of patients receiving world-class care.</p>
                <form>
                    <div class="input-box">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-phone"></i>
                        <input type="tel" placeholder="Mobile Number" required>
                    </div>
                    <div class="form-row">
                        <div class="input-box half">
                            <i class="fas fa-venus-mars"></i>
                            <select>
                                <option value="">Gender</option>
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                        </div>
                        <div class="input-box half">
                            <i class="fas fa-birthday-cake"></i>
                            <input type="date" title="Date of Birth" required>
                        </div>
                    </div>
                    <div class="input-box">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Create Password" required>
                    </div>
                    <div style="margin-bottom:2rem; display:flex; align-items:flex-start; gap:1rem;">
                        <input type="checkbox" id="terms" style="margin-top:0.3rem; accent-color:var(--primary); width:1.6rem; height:1.6rem; cursor:pointer;" required>
                        <label for="terms" style="font-size:1.3rem; color:var(--text-muted); cursor:pointer; line-height:1.6;">
                            I agree to the <a href="#" style="color:var(--primary); font-weight:600;">Terms of Service</a> and <a href="#" style="color:var(--primary); font-weight:600;">Privacy Policy</a>
                        </label>
                    </div>
                    <button type="submit" class="button btn-primary" style="width:100%; justify-content:center; border-radius:var(--radius-sm); font-size:1.6rem; padding:1.5rem;">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                <p class="toggle-text">Already have an account? <a href="#" id="to-login">Login here</a></p>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
